<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" font-family="Microsoft YaHei, sans-serif">
  
  <!-- 背景 -->
  <rect width="1000" height="750" fill="#f8f9fa" rx="8"/>
  
  <!-- 标题 -->
  <text x="500" y="35" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">AI桌宠系统架构图</text>
  
  <!-- ===== 第一层：客户端 ===== -->
  <rect x="50" y="60" width="900" height="160" rx="10" fill="#e8f4f8" stroke="#4a90d9" stroke-width="2"/>
  <text x="500" y="88" text-anchor="middle" font-size="16" font-weight="bold" fill="#4a90d9">客户端层 — Electron</text>
  
  <!-- 客户端三个模块 -->
  <rect x="80" y="105" width="260" height="95" rx="8" fill="#fff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="210" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🖥️ 悬浮窗模块</text>
  <text x="210" y="150" text-anchor="middle" font-size="11" fill="#666">透明置顶窗口</text>
  <text x="210" y="168" text-anchor="middle" font-size="11" fill="#666">可拖动 / 点击交互</text>
  <text x="210" y="186" text-anchor="middle" font-size="11" fill="#666">聊天气泡展示</text>

  <rect x="370" y="105" width="260" height="95" rx="8" fill="#fff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="500" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">💬 对话界面</text>
  <text x="500" y="150" text-anchor="middle" font-size="11" fill="#666">消息输入 / 发送</text>
  <text x="500" y="168" text-anchor="middle" font-size="11" fill="#666">性格选择面板</text>
  <text x="500" y="186" text-anchor="middle" font-size="11" fill="#666">消息历史展示</text>

  <rect x="660" y="105" width="260" height="95" rx="8" fill="#fff" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="790" y="130" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">🔌 WebSocket 连接器</text>
  <text x="790" y="150" text-anchor="middle" font-size="11" fill="#666">建立持久连接</text>
  <text x="790" y="168" text-anchor="middle" font-size="11" fill="#666">接收主动推送</text>
  <text x="790" y="186" text-anchor="middle" font-size="11" fill="#666">心跳保活</text>

  <!-- 客户端到后端的箭头 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>
  <line x1="500" y1="220" x2="500" y2="260" stroke="#e67e22" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="515" y="245" font-size="11" fill="#e67e22">HTTP / WS</text>

  <!-- ===== 第二层：后端 ===== -->
  <rect x="50" y="270" width="900" height="220" rx="10" fill="#fff8e1" stroke="#e67e22" stroke-width="2"/>
  <text x="500" y="298" text-anchor="middle" font-size="16" font-weight="bold" fill="#e67e22">后端服务层 — Spring Boot</text>

  <!-- Controller -->
  <rect x="80" y="315" width="260" height="155" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="210" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#d35400">Controller 层 (API入口)</text>
  <text x="210" y="362" text-anchor="middle" font-size="11" fill="#666">POST /api/chat/send</text>
  <text x="210" y="380" text-anchor="middle" font-size="11" fill="#666">GET /api/user/profile</text>
  <text x="210" y="398" text-anchor="middle" font-size="11" fill="#666">POST /api/memory/update</text>
  <text x="210" y="416" text-anchor="middle" font-size="11" fill="#666">POST /api/personality/switch</text>
  <text x="210" y="438" text-anchor="middle" font-size="11" fill="#666">WebSocket /ws/chat</text>

  <!-- Service -->
  <rect x="370" y="315" width="260" height="155" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="500" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#d35400">Service 层 (业务逻辑)</text>
  <text x="500" y="362" text-anchor="middle" font-size="11" fill="#666">ChatService：对话编排</text>
  <text x="500" y="380" text-anchor="middle" font-size="11" fill="#666">MemoryService：记忆管理</text>
  <text x="500" y="398" text-anchor="middle" font-size="11" fill="#666">PersonalityService：性格控制</text>
  <text x="500" y="416" text-anchor="middle" font-size="11" fill="#666">PromptService：提示词构建</text>
  <text x="500" y="438" text-anchor="middle" font-size="11" fill="#666">主动推送定时任务</text>

  <!-- DAO -->
  <rect x="660" y="315" width="260" height="155" rx="8" fill="#fff" stroke="#e67e22" stroke-width="1.5"/>
  <text x="790" y="340" text-anchor="middle" font-size="14" font-weight="bold" fill="#d35400">DAO 层 (数据访问)</text>
  <text x="790" y="362" text-anchor="middle" font-size="11" fill="#666">UserMapper</text>
  <text x="790" y="380" text-anchor="middle" font-size="11" fill="#666">ChatMessageMapper</text>
  <text x="790" y="398" text-anchor="middle" font-size="11" fill="#666">UserMemoryMapper</text>
  <text x="790" y="416" text-anchor="middle" font-size="11" fill="#666">PersonalityTemplateMapper</text>
  <text x="790" y="438" text-anchor="middle" font-size="11" fill="#666">MyBatis XML</text>

  <!-- 后端到数据库 -->
  <line x1="790" y1="490" x2="790" y2="530" stroke="#27ae60" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="805" y="515" font-size="11" fill="#27ae60">JDBC</text>

  <!-- ===== 第三层：数据层 ===== -->
  <rect x="50" y="540" width="900" height="95" rx="10" fill="#eafaf1" stroke="#27ae60" stroke-width="2"/>
  <text x="500" y="568" text-anchor="middle" font-size="16" font-weight="bold" fill="#27ae60">数据存储层</text>

  <rect x="80" y="580" width="410" height="40" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5"/>
  <text x="285" y="605" text-anchor="middle" font-size="13" fill="#333">🐬 MySQL (Docker) — 用户 / 对话 / 记忆 / 性格</text>

  <rect x="520" y="580" width="410" height="40" rx="6" fill="#fff" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="725" y="605" text-anchor="middle" font-size="13" fill="#888">📦 Chroma (后续扩展 RAG) — 向量检索</text>

  <!-- ===== AI能力层 ===== -->
  <rect x="50" y="655" width="900" height="70" rx="10" fill="#f5e6f5" stroke="#8e44ad" stroke-width="2"/>
  <text x="500" y="683" text-anchor="middle" font-size="16" font-weight="bold" fill="#8e44ad">AI 能力层</text>

  <rect x="350" y="692" width="300" height="25" rx="6" fill="#fff" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="500" y="709" text-anchor="middle" font-size="12" fill="#8e44ad">🤖 Qwen API — 对话生成 / 性格控制</text>

</svg>