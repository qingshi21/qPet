<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LumenAmi 启动器</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- 顶部拖拽栏 -->
    <div class="title-bar">
        <span class="title">LumenAmi</span>
        <div class="window-controls">
            <button class="btn-minimize" id="minimizeBtn">─</button>
            <button class="btn-close" id="closeBtn">✕</button>
        </div>
    </div>

    <!-- 内容区域 -->
    <div class="container">
        <!-- 左侧：logo展示 -->
        <div class="pet-display">
            <div class="pet-avatar">
                <img src="./assets/logo.png" alt="LumenAmi" class="pet-avatar-img">
            </div>
            <div class="pet-name">My LumenAmi</div>
        </div>

        <!-- 右侧：登录/注册表单 -->
        <div class="auth-panel">
            <div class="tab-switch">
                <span class="tab active" data-tab="login">登录</span>
                <span class="tab" data-tab="register">注册</span>
            </div>

            <!-- 登录表单 -->
            <form id="loginForm">
                <input type="text" placeholder="用户名" id="loginUsername">
                <input type="password" placeholder="密码" id="loginPassword">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMeCheckbox" checked>
                    <span>7天内免密登录</span>
                </label>
                <button type="submit">登录</button>
                <div class="error-msg" id="loginError"></div>
            </form>

            <!-- 注册表单（默认隐藏） -->
            <form id="registerForm" style="display:none;">
                <input type="text" placeholder="用户名" id="regUsername">
                <input type="password" placeholder="密码（至少6位）" id="regPassword">
                <button type="submit">注册</button>
                <div class="error-msg" id="regError"></div>
            </form>
        </div>

        <!-- 宠物列表区域 -->
        <div id="petListContainer" class="pet-list-container">
            <div class="pet-list-header">
                <span class="pet-list-title">我的桌宠</span>
                <button id="createPetBtn" class="btn-create">+ 新建</button>
            </div>
            <div id="petList" class="pet-list"></div>
            <button id="logoutBtn" class="btn-logout">退出登录</button>
        </div>
    </div>

    <!-- 创建宠物模态框 -->
    <div id="createPetModal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <span>创建新桌宠</span>
                <button class="modal-close" id="modalCloseBtn">✕</button>
            </div>
            <form id="createPetForm">
                <label>宠物名称 <span class="required">*</span></label>
                <input type="text" id="petNameInput" placeholder="给它起个名字吧" maxlength="20" required>
                <label>角色名称</label>
                <input type="text" id="petRoleInput" placeholder="如"艾莎公主"（可不填）" maxlength="30">
                <label>性格描述 <span class="required">*</span></label>
                <textarea id="petPromptInput" placeholder="如“你是一个温柔的AI伙伴，说话轻声细语”" rows="3" maxlength="500" required></textarea>
                <button type="button" class="btn-understand-role" id="understandRoleBtn">AI 理解角色</button>
                <div class="understand-loading" id="understandLoading" style="display:none;">AI 正在分析角色中...</div>
                
                <!-- 描述选择勾选框（AI 理解完成后显示） -->
                <div class="checkbox-group" id="descriptionChoiceGroup" style="display:none;">
                    <label class="checkbox-label">
                        <input type="checkbox" id="useUserDescCheckbox" checked>
                        <span>使用我的描述</span>
                    </label>
                    <label class="checkbox-label" style="margin-top: 8px;">
                        <input type="checkbox" id="useAiDescCheckbox" checked>
                        <span>使用 AI 理解结果</span>
                    </label>
                    <button type="button" class="btn-view-ai" id="viewAiUnderstandingBtn">查看 AI 理解结果</button>
                    <p class="checkbox-tip">至少勾选一个，两个都勾选会拼接在一起</p>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-cancel" id="modalCancelBtn">取消</button>
                    <button type="submit" class="btn-confirm">创建</button>
                </div>
                <div class="error-msg" id="createPetError"></div>
            </form>
        </div>
    </div>

    <!-- AI 理解结果编辑模态框 -->
    <div id="editUnderstandingModal" class="modal-overlay">
        <div class="modal modal-large">
            <div class="modal-header">
                <span>AI 角色理解结果</span>
                <button class="modal-close" id="closeEditUnderstandingBtn">✕</button>
            </div>
            <div class="modal-body">
                <p class="understanding-tip">以下是 AI 根据你的描述生成的角色理解，你可以编辑修改后保存：</p>
                <textarea id="aiUnderstandingTextarea" rows="12" placeholder="AI 生成的角色理解将显示在这里..."></textarea>
                <div class="error-msg" id="editUnderstandingError"></div>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="cancelEditUnderstandingBtn">取消</button>
                <button type="button" class="btn-confirm" id="confirmEditUnderstandingBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div id="deleteConfirmModal" class="modal-overlay">
        <div class="modal modal-small">
            <div class="modal-header">
                <span>确认删除</span>
                <button class="modal-close" id="closeDeleteConfirmBtn">✕</button>
            </div>
            <div class="modal-body">
                <p class="delete-confirm-text" id="deleteConfirmText">确定要删除这个桌宠吗？</p>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="cancelDeleteBtn">取消</button>
                <button type="button" class="btn-danger" id="confirmDeleteBtn">删除</button>
            </div>
        </div>
    </div>

    <!-- AI理解警告弹窗 -->
    <div id="aiWarningModal" class="modal-overlay">
        <div class="modal modal-small">
            <div class="modal-header">
                <span>⚠️ 提示</span>
                <button class="modal-close" id="closeAiWarningBtn">✕</button>
            </div>
            <div class="modal-body">
                <p class="delete-confirm-text">联网搜索信息有限，AI理解可能会有偏差，请谨慎使用。</p>
                <p class="delete-confirm-text" style="margin-top:6px;font-size:12px;opacity:0.6;">是否继续查看 AI 生成的角色理解？</p>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-cancel" id="cancelAiWarningBtn">取消</button>
                <button type="button" class="btn-confirm" id="confirmAiWarningBtn">继续查看</button>
            </div>
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>
</html>
