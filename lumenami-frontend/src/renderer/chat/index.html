<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LumenAmi 聊天</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- 标题栏 -->
    <div class="title-bar">
        <div class="title-left">
            <span class="pet-avatar" id="petAvatar"></span>
            <span class="pet-name" id="petName">LumenAmi</span>
        </div>
        <div class="window-controls">
            <button class="btn-memory" id="memoryBtn" title="记忆管理">🧠</button>
            <button class="btn-minimize" id="minimizeBtn">─</button>
            <button class="btn-close" id="closeBtn">✕</button>
        </div>
    </div>

    <!-- 主容器：聊天区 + 记忆侧边栏 -->
    <div class="main-container">
        <!-- 聊天消息区域 -->
        <div class="chat-area" id="chatArea">
            <div class="welcome-msg" id="welcomeMsg">
                <div class="welcome-icon">✨</div>
                <div class="welcome-text">开始和你的朋友聊天吧！</div>
            </div>
        </div>

        <!-- 记忆侧边栏（默认隐藏） -->
        <div class="memory-sidebar" id="memorySidebar">
            <div class="memory-header">
                <h3>🧠 记忆管理</h3>
                <button class="btn-close-sidebar" id="closeMemorySidebar">✕</button>
            </div>
            
            <div class="memory-list" id="memoryList">
                <!-- 记忆列表动态生成 -->
            </div>
            
            <div class="memory-actions">
                <button class="btn-add-memory" id="addMemoryBtn">+ 添加记忆</button>
            </div>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button id="sendBtn" class="send-btn" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <!-- 添加记忆模态框 -->
    <div class="modal" id="addMemoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加新记忆</h3>
                <button class="btn-modal-close" id="closeAddMemoryModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>记忆类型</label>
                    <select id="memoryType">
                        <option value="PROFILE">用户画像</option>
                        <option value="PROJECT">项目信息</option>
                        <option value="PREFERENCE">偏好设置</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>记忆键名（英文，如 user_name）</label>
                    <input type="text" id="memoryKey" placeholder="user_name">
                </div>
                <div class="form-group">
                    <label>记忆值</label>
                    <textarea id="memoryValue" rows="3" placeholder="小明"></textarea>
                </div>
                <div class="form-group">
                    <label>重要性（1-10）</label>
                    <input type="number" id="memoryImportance" min="1" max="10" value="5">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelAddMemory">取消</button>
                <button class="btn-confirm" id="confirmAddMemory">确认添加</button>
            </div>
        </div>
    </div>

    <!-- 编辑记忆模态框 -->
    <div class="modal" id="editMemoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑记忆</h3>
                <button class="btn-modal-close" id="closeEditMemoryModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>记忆标签</label>
                    <input type="text" id="editMemoryLabel" disabled style="background:#f5f5f7;color:#999;">
                </div>
                <div class="form-group">
                    <label>记忆值</label>
                    <textarea id="editMemoryValue" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>重要性（1-10）</label>
                    <input type="number" id="editMemoryImportance" min="1" max="10" value="5">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="cancelEditMemory">取消</button>
                <button class="btn-confirm" id="confirmEditMemory">保存修改</button>
            </div>
        </div>
    </div>

    <!-- 记忆历史模态框 -->
    <div class="modal" id="memoryHistoryModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>记忆变更历史</h3>
                <button class="btn-modal-close" id="closeHistoryModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="history-list" id="historyList">
                    <!-- 动态生成 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-confirm" id="closeHistoryBtn">关闭</button>
            </div>
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>
</html>
