<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LumenAmi 聊天</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- 标题栏 -->
    <div class="title-bar">
        <div class="title-left">
            <span class="pet-avatar" id="petAvatar">🐱</span>
            <span class="pet-name" id="petName">LumenAmi</span>
        </div>
        <div class="window-controls">
            <button class="btn-minimize" id="minimizeBtn">─</button>
            <button class="btn-close" id="closeBtn">✕</button>
        </div>
    </div>

    <!-- 聊天消息区域 -->
    <div class="chat-area" id="chatArea">
        <div class="welcome-msg" id="welcomeMsg">
            <div class="welcome-icon">✨</div>
            <div class="welcome-text">开始和你的朋友聊天吧！</div>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
            <button id="sendBtn" class="send-btn" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script src="./renderer.js"></script>
</body>
</html>
