<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>qPet 桌宠</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            user-select: none;
            -webkit-app-region: drag;
        }
        .drag-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 28px;
            -webkit-app-region: drag;
            z-index: 5;
        }
        .close-btn {
            position: fixed;
            top: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 12px;
            cursor: pointer;
            -webkit-app-region: no-drag;
            z-index: 10;
        }
        .close-btn:hover {
            background: #e74c3c;
        }
        .pet {
            background: rgba(255, 255, 255, 0.85);
            padding: 20px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            font-size: 18px;
            cursor: pointer;
            -webkit-app-region: no-drag;
        }
        .pet:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="drag-bar"></div>
    <div class="close-btn" id="closeBtn">✕</div>
    <div class="pet" id="pet">🐱 点击我聊天</div>
    <script>
        document.getElementById('pet').addEventListener('click', () => {
            alert('💬 聊天功能开发中...');
        });
        document.getElementById('closeBtn').addEventListener('click', () => {
            window.close();
        });
    </script>
</body>
</html>
